apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-system
  namespace: pos-system
  labels:
    app: pos-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pos-system
  template:
    metadata:
      labels:
        app: pos-system
    spec:
      serviceAccountName: pos-system
      containers:
        - name: pos-system
          image: registry.digitalocean.com/pos-system-registry/pos-system:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: APP_NAME
              value: "POS System"
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: app-key
            - name: DB_CONNECTION
              value: "mysql"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_HOST
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD
            - name: CACHE_DRIVER
              value: "redis"
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
            - name: LOG_CHANNEL
              value: "stack"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: pos-system
  namespace: pos-system
  labels:
    app: pos-system
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: pos-system

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pos-system
  namespace: pos-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pos-system
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: batch/v1
kind: Job
metadata:
  name: pos-system-migration
  namespace: pos-system
spec:
  template:
    spec:
      serviceAccountName: pos-system
      containers:
        - name: migration
          image: registry.digitalocean.com/pos-system-registry/pos-system:latest
          command: ["php", "artisan", "migrate", "--force"]
          env:
            - name: APP_ENV
              value: "production"
            - name: DB_CONNECTION
              value: "mysql"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_HOST
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD
      restartPolicy: OnFailure

---
apiVersion: v1
kind: Namespace
metadata:
  name: pos-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pos-system
  namespace: pos-system
