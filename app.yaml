name: pos-system

services:
  - name: pos-system-web
    github:
      branch: main
      repo: YOUR_GITHUB_USERNAME/POS-system

    build_command: |
      composer install --no-dev --optimize-autoloader &&
      npm install &&
      npm run build &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      php artisan migrate --force

    run_command: heroku-php-apache2 public/

    envs:
      - key: APP_NAME
        value: "POS System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stack
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: database

    envs_from_env_file: true

    health_check:
      http_path: /

    http_port: 8080
    internal_ports:
      - 8080

    instance_count: 1
    instance_size_slug: basic-s

databases:
  - name: pos-system-db
    engine: MYSQL
    version: "8"
    production: true

ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: pos-system-web