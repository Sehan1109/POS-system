name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SSH secrets
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY is missing."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "SSH_HOST is missing."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "SSH_USER is missing."
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'set -e
             REPO_URL="https://github.com/${{ github.repository }}.git"
             DEFAULT_DIR="/var/www/laravel-pos"
             APP_DIR=""

             for d in \
               "/var/www/laravel-pos" \
               "/var/www/pos-system" \
               "/var/www/POS-system" \
               "/var/www/html/pos-system" \
               "$HOME/pos-system" \
               "$HOME/POS-system" \
               "$HOME/www/pos-system"
             do
               if [ -d "$d/.git" ] && [ -f "$d/artisan" ]; then
                 APP_DIR="$d"
                 break
               fi
             done

             if [ -z "$APP_DIR" ]; then
               APP_DIR="$(find /var/www "$HOME" -maxdepth 5 -type f -name artisan 2>/dev/null | sed "s#/artisan$##" | head -n 1)"
             fi

             if [ -z "$APP_DIR" ]; then
               APP_DIR="$DEFAULT_DIR"
             fi

             if [ -z "$APP_DIR" ]; then
               echo "Deploy directory is empty."
               exit 1
             fi

             mkdir -p "$APP_DIR"
             cd "$APP_DIR"
             echo "Deploying from $APP_DIR"

             if [ ! -d .git ]; then
               echo "Project not found. Cloning repository into $APP_DIR"
               git clone "$REPO_URL" .
             fi

             git fetch origin main
             git reset --hard origin/main
             if [ ! -f .env ]; then cp .env.example .env; fi
             grep -q "^DB_CONNECTION=" .env && sed -i "s/^DB_CONNECTION=.*/DB_CONNECTION=mysql/" .env || echo "DB_CONNECTION=mysql" >> .env
             grep -q "^DB_HOST=" .env && sed -i "s/^DB_HOST=.*/DB_HOST=127.0.0.1/" .env || echo "DB_HOST=127.0.0.1" >> .env
             grep -q "^DB_PORT=" .env && sed -i "s/^DB_PORT=.*/DB_PORT=3306/" .env || echo "DB_PORT=3306" >> .env
             grep -q "^DB_DATABASE=" .env && sed -i "s/^DB_DATABASE=.*/DB_DATABASE=pos_system/" .env || echo "DB_DATABASE=pos_system" >> .env
             grep -q "^DB_USERNAME=" .env && sed -i "s/^DB_USERNAME=.*/DB_USERNAME=laraval/" .env || echo "DB_USERNAME=laraval" >> .env
             grep -q "^DB_PASSWORD=" .env && sed -i "s/^DB_PASSWORD=.*/DB_PASSWORD=12345678/" .env || echo "DB_PASSWORD=12345678" >> .env

             DB_ADMIN_CMD=""
             if command -v mysql >/dev/null 2>&1; then
               if sudo mysql -e "SELECT 1" >/dev/null 2>&1; then
                 DB_ADMIN_CMD="sudo mysql"
               elif mysql -uroot -e "SELECT 1" >/dev/null 2>&1; then
                 DB_ADMIN_CMD="mysql -uroot"
               fi
             fi

             if [ -n "$DB_ADMIN_CMD" ]; then
               echo "Ensuring MySQL database and user exist"
               $DB_ADMIN_CMD -e "CREATE DATABASE IF NOT EXISTS pos_system;"
               $DB_ADMIN_CMD -e "CREATE USER IF NOT EXISTS laraval@localhost IDENTIFIED BY \"12345678\";"
               $DB_ADMIN_CMD -e "ALTER USER laraval@localhost IDENTIFIED BY \"12345678\";"
               $DB_ADMIN_CMD -e "GRANT ALL PRIVILEGES ON pos_system.* TO laraval@localhost;"
               $DB_ADMIN_CMD -e "FLUSH PRIVILEGES;"
             else
               echo "Could not run MySQL admin commands automatically. Ensure DB user laraval has access to pos_system."
             fi

             composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
             npm ci
             npm run build
             php artisan config:clear
             php artisan migrate --force'

      - name: Notify Deployment Success
        if: success()
        run: echo "Deployment via SSH completed successfully."

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "Deployment via SSH failed."
          exit 1

  post-deploy:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Get deployed app info
        run: |
          echo "Application deployed via SSH."

      - name: Send notification (optional)
        run: |
          echo "You can optionally send a Slack/Discord notification here"
